name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/gradle-build-action@v2
        with:
          gradle-version: '8.2'
      - uses: android-actions/setup-android@v2
      - run: unzip -o BisikChat-FINAL.zip -d extracted
      - run: |
          cd extracted
          unzip -o BisikChat-v2.zip
          cd BisikChat
          gradle assembleDebug --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: BisikChat-APK
          path: extracted/BisikChat/app/build/outputs/apk/debug/app-debug.apk
